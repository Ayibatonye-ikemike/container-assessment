apiVersion: apps/v1
kind: Deployment
metadata:
  name: muchtodo-backend
  namespace: muchtodo-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: muchtodo-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        # This part mounts the secret as the .env file in /home/techuser/
        volumeMounts:
        - name: config-volume
          mountPath: /home/techuser/.env
          subPath: .env
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
      volumes:
      - name: config-volume
        secret:
          secretName: backend-env-secret
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: muchtodo-ns
spec:
  type: NodePort
  selector:
    app: backend
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
